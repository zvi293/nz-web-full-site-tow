<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="nz-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="nz-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="#0a0911"/>
  <rect x="6" y="6" width="500" height="500" rx="112" fill="none" stroke="url(#nz-grad)" stroke-width="3" opacity="0.5"/>
  <g filter="url(#nz-glow)">
    <text x="256" y="332" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" font-size="232" font-weight="700" fill="url(#nz-grad)">NZ</text>
  </g>
</svg>
